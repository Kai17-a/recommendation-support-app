version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: uv
    directory: /apps/api
    schedule:
      interval: weekly
    groups:
      api-python:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      web-javascript:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: /apps/api
    schedule:
      interval: weekly
    groups:
      api-container:
        patterns: ["*"]
