name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  quality:
    name: Verify release source
    uses: ./.github/workflows/ci.yml

  publish:
    name: Publish API image and GitHub Release
    needs: quality
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate semantic version tag
        shell: bash
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must be semantic version shaped: v1.2.3" >&2
            exit 1
          fi
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Release tag must point to a commit contained in main" >&2
            exit 1
          fi

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref_name, 'v0.') }}
            type=raw,value=latest

      - name: Build and push multi-platform image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: apps/api
          file: apps/api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Attest registry image provenance
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Build amd64 Docker release archive
        uses: docker/build-push-action@v7
        with:
          context: apps/api
          file: apps/api/Dockerfile
          platforms: linux/amd64
          outputs: type=docker,dest=/tmp/recommendation-support-api-${{ github.ref_name }}-linux-amd64.docker.tar
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Create release assets
        shell: bash
        run: |
          archive="recommendation-support-api-${GITHUB_REF_NAME}-linux-amd64.docker.tar"
          mv "/tmp/${archive}" .
          zstd -19 --rm "${archive}"
          syft "${REGISTRY}/${IMAGE_NAME}@${{ steps.push.outputs.digest }}" \
            -o cyclonedx-json="recommendation-support-api-${GITHUB_REF_NAME}.sbom.cdx.json"
          sha256sum \
            "${archive}.zst" \
            "recommendation-support-api-${GITHUB_REF_NAME}.sbom.cdx.json" \
            > SHA256SUMS

      - name: Attest downloadable artifacts
        uses: actions/attest@v4
        with:
          subject-path: |
            recommendation-support-api-${{ github.ref_name }}-linux-amd64.docker.tar.zst
            recommendation-support-api-${{ github.ref_name }}.sbom.cdx.json
            SHA256SUMS

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes \
              --title "$GITHUB_REF_NAME"
          gh release upload "$GITHUB_REF_NAME" --clobber \
            "recommendation-support-api-${GITHUB_REF_NAME}-linux-amd64.docker.tar.zst" \
            "recommendation-support-api-${GITHUB_REF_NAME}.sbom.cdx.json" \
            SHA256SUMS
