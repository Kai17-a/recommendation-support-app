name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_call:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  api:
    name: API quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: apps/api/uv.lock
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install API dependencies
        run: uv sync --directory apps/api --frozen --all-groups
      - name: Ruff
        run: uv run --directory apps/api ruff check .
      - name: Type check
        run: uv run --directory apps/api ty check
      - name: Unit tests
        run: uv run --directory apps/api pytest -q

  web:
    name: Web quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - name: Install web dependencies
        run: bun install --frozen-lockfile
      - name: ESLint
        run: bun run web:lint
      - name: Type check
        run: bun run web:typecheck
      - name: Unit tests
        run: bun run web:test
      - name: Production build
        run: bun run --cwd apps/web build

  integration:
    name: Docker integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Run real-service integration tests
        run: ./scripts/run-api-integration-tests.sh

  production-image:
    name: Production image build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build production API image
        uses: docker/build-push-action@v7
        with:
          context: apps/api
          file: apps/api/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
