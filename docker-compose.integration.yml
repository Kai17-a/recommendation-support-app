services:
  postgres:
    ports: !reset []

  redis:
    ports: !reset []

  minio:
    ports: !reset []

  migrate:
    profiles: [integration]
    build:
      context: ./apps/api
      dockerfile: Dockerfile.integration
    command: alembic upgrade head
    environment: &api-environment
      DATABASE_URL: postgresql+psycopg://app:change-me-for-local-development@postgres:5432/recommendation_support
      REDIS_URL: redis://redis:6379/0
      OIDC_ISSUER_URL: http://mock-services:8080
      OIDC_AUDIENCE: recommendation-support-api
      S3_ENDPOINT_URL: http://minio:9000
      S3_MARKDOWN_BUCKET: recommendation-support-markdown
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: change-me-for-local-development
      E2E_AI_GATEWAY_API_KEY: integration-secret
    depends_on:
      postgres:
        condition: service_healthy

  mock-services:
    profiles: [integration]
    build:
      context: ./apps/api
      dockerfile: Dockerfile.integration
    command: uvicorn tests.integration.mock_services:app --host 0.0.0.0 --port 8080
    healthcheck:
      test: [CMD, python, -c, "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 2s
      timeout: 2s
      retries: 20

  bootstrap-smoke:
    profiles: [integration]
    build:
      context: ./apps/api
      dockerfile: Dockerfile.integration
    command:
      - python
      - -m
      - app.bootstrap.cli
      - --department-code
      - integration-ops
      - --department-name
      - Integration Operations
      - --user-name
      - Integration Operator
      - --email
      - integration-operator@example.test
      - --oidc-subject
      - integration-operator
      - --role
      - system_operator
    environment: *api-environment
    depends_on:
      migrate:
        condition: service_completed_successfully

  api:
    profiles: [integration]
    build:
      context: ./apps/api
      dockerfile: Dockerfile.integration
    environment: *api-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
      bootstrap-smoke:
        condition: service_completed_successfully
      mock-services:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: [CMD, python, -c, "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 2s
      timeout: 2s
      retries: 20

  worker:
    profiles: [integration]
    build:
      context: ./apps/api
      dockerfile: Dockerfile.integration
    command: dramatiq app.ai.tasks app.markdown_imports.tasks --processes 1 --threads 2
    environment: *api-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
      bootstrap-smoke:
        condition: service_completed_successfully
      mock-services:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  integration-tests:
    profiles: [integration]
    build:
      context: ./apps/api
      dockerfile: Dockerfile.integration
    command: pytest -m integration -q tests/integration
    environment:
      <<: *api-environment
      INTEGRATION_API_URL: http://api:8000
      INTEGRATION_MOCK_URL: http://mock-services:8080
    depends_on:
      api:
        condition: service_healthy
      worker:
        condition: service_started
